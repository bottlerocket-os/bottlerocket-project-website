[docs]
title = "NVIDIA Container Runtime"
description = """
Settings for the NVIDIA Container Toolkit runtime configuration.
These settings control how NVIDIA GPU devices are exposed to containers.
"""

[[docs.ref.visible-devices-as-volume-mounts]]
description = "Controls whether we should inject the list of devices under a specific folder (`/var/run/nvidia-container-devices`) as volume mounts instead of as an environment variable into a container."
default = "`true`"
accepted_values = [
  "`true`",
  "`false`"
]

[[docs.ref.visible-devices-envvar-when-unprivileged]]
description = "Controls whether to honour `NVIDIA_VISIBLE_DEVICES` environment variable on containers started with `CAP_SYS_ADMIN` privileges."
default = "`false`"
accepted_values = [
  "`true`",
  "`false`"
]
