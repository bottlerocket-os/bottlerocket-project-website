[[docs.ref.reserved-cpus]]
description = "The specific CPU cores to reserve exclusively for system processes. Follows the `cpuset` format."
see = [
    [ "[`reservedSystemCPUs` in Kubelet Configuration](https://kubernetes.io/docs/reference/config-api/kubelet-config.v1beta1/)" ]
]

[[docs.ref.reserved-cpus.example]]
comment = "Example user data for reserving cores 0, 3, 4, 5, and 8"
value = "\"0,3-5,8\""

[[docs.ref.pod-infra-container-image]]
deprecated = true
description = """
Bottlerocket ships the pause container image as of v1.21.0, so this setting provides no functionality.
The setting still exists for backwards compatibility.
"""

[[docs.ref.hostname-override-source]]
description = "The source of identification for the Kubernetes node name. This defaults to the private DNS name, but can be changed to allow for a name based on the EC2 instance ID."
warning = "Prior to using the `instance-id` value, users must either create an EKS cluster access entry or update the `kube-system/aws-auth` ConfigMap so the node can successfully register to EKS."
default= "`private-dns-name`"
accepted_values = [
    "`private-dns-name`",
    "`instance-id`"
]
