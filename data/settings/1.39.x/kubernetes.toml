[[docs.ref.container-log-max-workers]]
description = """
The maximum number of concurrent workers to spawn for performing container log rotate operations.
This setting is only available for Kubernetes 1.30 and later variants.
"""
see = [
    ["[`containerLogMaxWorkers` in Kubelet Configuration](https://kubernetes.io/docs/reference/config-api/kubelet-config.v1beta1/)"],
    ["[Logging Architecture](https://kubernetes.io/docs/concepts/cluster-administration/logging/)"]
]

[[docs.ref.container-log-max-workers.example]]
comment = "Set maximum container log workers to 3 (K8s 1.30+ only)"
value = "3"

[[docs.ref.container-log-monitor-interval]]
description = """
The interval at which the kubelet monitors container logs for rotation and cleanup.
This setting is only available for Kubernetes 1.30 and later variants.
"""
see = [
    ["[`containerLogMonitorInterval` in Kubelet Configuration](https://kubernetes.io/docs/reference/config-api/kubelet-config.v1beta1/)"],
    ["[Logging Architecture](https://kubernetes.io/docs/concepts/cluster-administration/logging/)"]
]

[[docs.ref.container-log-monitor-interval.example]]
comment = "Set container log monitor interval to 20 seconds (K8s 1.30+ only)"
value = "\"20s\""

[[docs.ref.seccomp-default]]
description = "Enable `RuntimeDefault` as the default seccomp profile for all workloads via `kubelet-configuration`"
default= "`true` for k8s-1.33+ variants, `false` for other variants"
accepted_values = [
    "`true`",
    "`false`"
]

[[docs.ref.single-process-oom-kill]]
description = """
Controls single-process OOM killing behavior for Kubernetes pods.
If true, prevents the memory.oom.group flag from being set for container cgroups in cgroups v2, causing processes in the container to be OOM killed individually instead of as a group.
When enabled, the OOM killing behavior aligns with cgroups v1 behavior.
This setting is only available for Kubernetes 1.32 and later variants.
"""
accepted_values = [
    "`true`",
    "`false`"
]
see = [
    ["[`singleProcessOOMKill` in Kubelet Configuration](https://kubernetes.io/docs/reference/config-api/kubelet-config.v1beta1/)"],
    ["[Managing Resources for Containers](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)"]
]

[[docs.ref.single-process-oom-kill.example]]
comment = "Enable single-process OOM killing (K8s 1.32+ only)"
value = "true"
